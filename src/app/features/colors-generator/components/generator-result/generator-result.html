<div class="vh-100 vw-100 d-flex flex-column justify-content-center align-items-center position-relative">
  <div class="container d-flex justify-content-between z-1" [style.border]="'1px solid ' + _color.HEX" (click)="copyRGBAToClipboard()">
    <p>RGBA</p>
    <div class="d-flex flex-column">
      <span>{{_color.RGBA.fullColor}}</span>
      <p class="copied-text fst-italic fw-normal align-self-end p-1" *ngIf="RGBACopied">copied!!!</p>
    </div>
  </div>
  <div class="container d-flex justify-content-between z-1" [style.border]="'1px solid ' + _color.HEX" (click)="copyHEXToClipboard()">
    <p>HEX</p>
    <div class="d-flex flex-column">
      <span>{{_color.HEX}}</span>
      <p class="copied-text fst-italic fw-normal align-self-end p-1" *ngIf="HEXCopied">copied!!!</p>
    </div>
  </div>
  <canvas #previewBoxCanvas class="position-absolute z-0"></canvas>
  <h1 class="title-result position-absolute z-0">MAKE YOUR COLOR</h1>
</div>
